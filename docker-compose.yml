services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - path: ./api_key.env
        required: false
    environment:
      LAYOUTXLM_MODEL_PATH: /app/models
    volumes:
      - ./data:/app/data
      - ./models:/app/models:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./UI/Data Export Interface
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
